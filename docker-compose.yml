# ===================================================================
# Spirit Tech Revolution – Site vitrine
# ===================================================================
# Prérequis : réseau Docker "proxy" créé par l'infra partagée
#
# Démarrage :
#   cd /opt/vitrine
#   docker compose --env-file .env up -d
#
# Image Docker Hub : spirittechrevolution/str-vitrine
# URL publique     : https://spirittechrevolution.com
# ===================================================================

services:
  vitrine:
    image: spirittechrevolution/str-vitrine:${TAG:-latest}
    container_name: str-vitrine
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - traefik.enable=true

      # www.spirittechrevolution.com
      - traefik.http.routers.vitrine.rule=Host(`www.${INFRA_DOMAIN}`)
      - traefik.http.routers.vitrine.entrypoints=websecure
      - traefik.http.routers.vitrine.tls.certresolver=letsencrypt
      - traefik.http.services.vitrine.loadbalancer.server.port=80

      # spirittechrevolution.com → redirect vers www
      - traefik.http.routers.vitrine-apex.rule=Host(`${INFRA_DOMAIN}`)
      - traefik.http.routers.vitrine-apex.entrypoints=websecure
      - traefik.http.routers.vitrine-apex.tls.certresolver=letsencrypt
      - traefik.http.routers.vitrine-apex.service=vitrine
      - traefik.http.routers.vitrine-apex.middlewares=vitrine-www-redirect
      - traefik.http.middlewares.vitrine-www-redirect.redirectregex.regex=^https://$
      - traefik.http.middlewares.vitrine-www-redirect.redirectregex.replacement=https://www.${INFRA_DOMAIN}/$${1}
      - traefik.http.middlewares.vitrine-www-redirect.redirectregex.permanent=true

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true