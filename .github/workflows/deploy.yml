# ===================================================================
# Spirit Tech – Site Vitrine
# Build Docker → Docker Hub → Deploy VPS
#
# Secrets GitHub requis (Settings → Secrets and variables → Actions) :
#   DOCKER_HUB_USERNAME      → spirittechrevolution
#   DOCKER_HUB_TOKEN         → token Docker Hub
#   VPS_HOST                 → 155.117.40.193
#   VPS_USER                 → administrator
#   VPS_SSH_PRIVATE_KEY      → clé SSH dédiée CI/CD
# ===================================================================

name: Deploy Vitrine

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ─── 1. Build & Push Docker image ──────────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            spirittechrevolution/str-vitrine:latest
            spirittechrevolution/str-vitrine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 2. Deploy sur le VPS ──────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Crée le répertoire s'il n'existe pas encore
            mkdir -p /opt/vitrine

            # Vérifie que le .env est présent
            if [ ! -f /opt/vitrine/.env ]; then
              echo "ERREUR : /opt/vitrine/.env manquant."
              echo "Créez-le avec : cp .env.example .env && nano .env"
              exit 1
            fi

            cd /opt/vitrine

            echo "=== Pull nouvelle image ==="
            docker compose --env-file .env pull

            echo "=== Redémarrage du conteneur ==="
            docker compose --env-file .env up -d --remove-orphans

            echo "=== État des services ==="
            docker compose ps

            echo "=== Déploiement vitrine terminé ==="
